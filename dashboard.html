<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - CodeMed Academy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family:Arial; padding:20px; max-width:600px; margin:auto;">

<h2>📊 Your Performance Dashboard</h2>

<p><strong>Total XP:</strong> <span id="xp"></span></p>
<p><strong>🔥 Streak:</strong> <span id="streak"></span> days</p>
<p><strong>❤️ Lives:</strong> <span id="lives"></span></p>

<script>
document.getElementById("xp").innerText =
  localStorage.getItem("xp") || 0;

document.getElementById("streak").innerText =
  localStorage.getItem("streak") || 0;

let lives = localStorage.getItem("lives") || 3;
document.getElementById("lives").innerText =
  "❤️".repeat(lives);
</script>

</body>
</html>
